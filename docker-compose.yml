services:
  setup-framework:
    container_name: setup-framework
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Setup.Dockerfile
    image: setup-framework:latest
    command: python benchmark_runner.py --script-id setup-framework --benchmark-run 1

  container-orchestrator:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Orchestrator.Dockerfile
    image: container-orchestrator:latest
    command: python -m main

  db-scan-blob-storage:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Query.Dockerfile
    image: db-scan-blob-storage:latest
    command: python benchmark_runner.py --script-id db-scan-blob-storage

  db-scan-postgis:
