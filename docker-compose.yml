services:
  container-orchestrator:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Orchestrator.Dockerfile
    image: container-orchestrator:latest
    command: python -m main

  db-scan-blob-storage:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Query.Dockerfile
    image: db-scan-blob-storage:latest
    command: python benchmark_runner.py --script-id db-scan-blob-storage

  db-scan-postgis:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Query.Dockerfile
    image: db-scan-postgis:latest
    command: python benchmark_runner.py --script-id db-scan-postgis

  bbox-filtering-advanced-duckdb:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Query.Dockerfile
    image: bbox-filtering-advanced-duckdb:latest
    command: python benchmark_runner.py --script-id bbox-filtering-advanced-duckdb

  bbox-filtering-advanced-postgis:
    env_file:
      - .env
    build:
      context: .
      dockerfile: .docker/Query.Dockerfile
    image: bbox-filtering-advanced-postgis:latest
    command: python benchmark_runner.py --script-id bbox-filtering-advanced-postgis
